<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bro · image gen</title>
<style>
  /* claude.ai-inspired palette: warm ivory surfaces, serif display, terracotta accent */
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --surface-2: #f5f4ee;
    --border: #e8e6dc;
    --border-strong: #d9d6c8;
    --text: #1f1e1d;
    --text-2: #6e6b60;
    --text-3: #a6a294;
    --accent: #d97757;
    --accent-hover: #c96442;
    --accent-soft: #f7ede8;
    --danger: #b4442c;
    --shadow: 0 1px 2px rgba(31, 30, 29, .04), 0 4px 16px rgba(31, 30, 29, .06);
    --shadow-lg: 0 4px 12px rgba(31, 30, 29, .08), 0 16px 48px rgba(31, 30, 29, .14);
    --radius: 14px;
    --serif: ui-serif, Georgia, 'Times New Roman', serif;
    --sans: ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 var(--sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 24px 96px; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: baseline; gap: 14px;
    padding: 30px 2px 6px;
  }
  header h1 {
    font: 400 26px/1.2 var(--serif);
    letter-spacing: -.01em;
    margin: 0;
  }
  header h1 .spark { color: var(--accent); }
  .head-meta { color: var(--text-2); font-size: 13px; display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .head-meta .dot { color: var(--border-strong); }
  #outDir { cursor: pointer; border-bottom: 1px dotted var(--border-strong); }
  #outDir:hover { color: var(--text); }
  #activeBadge {
    display: none; margin-left: auto; align-self: center;
    font-size: 12.5px; color: var(--accent-hover);
    background: var(--accent-soft); border: 1px solid #ecd6cb;
    padding: 3px 10px; border-radius: 999px;
  }
  #activeBadge.on { display: inline-flex; align-items: center; gap: 7px; }
  #activeBadge .pip {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; transform: scale(.8); } }

  /* ---------- composer ---------- */
  .composer {
    position: sticky; top: 14px; z-index: 40;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 14px 14px 10px;
    margin-top: 14px;
    transition: box-shadow .2s, border-color .2s;
  }
  .composer:focus-within { border-color: var(--border-strong); box-shadow: var(--shadow-lg); }
  .composer.dragover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  #attachRow { display: none; flex-wrap: wrap; gap: 8px; padding: 2px 4px 10px; }
  #attachRow.has { display: flex; }
  .chip {
    position: relative; width: 54px; height: 54px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border-strong); box-shadow: var(--shadow);
  }
  .chip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .chip .rm {
    all: unset; cursor: pointer; position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(31, 30, 29, .65); color: #fff;
    font-size: 10px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .chip .rm:hover { background: var(--danger); }
  #ctxBar {
    display: none; align-items: center; gap: 10px;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--surface-2);
  }
  #ctxBar.has { display: flex; }
  .ctx-label { font-size: 11px; color: var(--text-3); flex: none; text-transform: uppercase; letter-spacing: .06em; }
  #ctxRow { display: flex; gap: 6px; overflow-x: auto; padding: 2px; min-width: 0; }
  .ctx-item {
    position: relative; flex: none; width: 42px; height: 42px;
    border-radius: 9px; overflow: hidden; cursor: pointer;
    border: 1.5px solid var(--border); opacity: .8;
    transition: opacity .15s, border-color .15s;
  }
  .ctx-item:hover { opacity: 1; border-color: var(--border-strong); }
  .ctx-item.sel { opacity: 1; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .ctx-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ctx-item .rm {
    all: unset; cursor: pointer; position: absolute; top: 1px; right: 1px;
    width: 15px; height: 15px; border-radius: 50%;
    background: rgba(31, 30, 29, .65); color: #fff;
    font-size: 9px; line-height: 1;
    display: none; align-items: center; justify-content: center;
  }
  .ctx-item:hover .rm { display: flex; }
  .ctx-item .rm:hover { background: var(--danger); }
  #prompt {
    width: 100%; border: 0; outline: 0; resize: none;
    background: transparent; color: var(--text);
    font: 16px/1.5 var(--sans);
    min-height: 27px; max-height: 160px;
    padding: 2px 4px;
  }
  #prompt::placeholder { color: var(--text-3); }
  .composer-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--surface-2);
  }
  .ctl { display: inline-flex; align-items: center; gap: 6px; }
  .ctl label { font-size: 12px; color: var(--text-3); }
  select, .stepper, #attachBtn {
    appearance: none; -webkit-appearance: none;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 9px;
    font: 13px var(--sans); padding: 6px 10px;
    cursor: pointer; outline: none;
  }
  select:hover, #attachBtn:hover { border-color: var(--border-strong); }
  #attachBtn { color: var(--text-2); }
  select:focus { border-color: var(--accent); }
  select:disabled { opacity: .45; cursor: not-allowed; }
  #modelCustom {
    display: none; width: 170px;
    background: var(--surface-2); border: 1px solid var(--accent);
    border-radius: 9px; padding: 6px 10px; font: 13px var(--sans);
    color: var(--text); outline: none;
  }
  .stepper { display: inline-flex; align-items: center; padding: 0; overflow: hidden; user-select: none; }
  .stepper button {
    all: unset; cursor: pointer; padding: 6px 11px; color: var(--text-2);
    font-size: 14px; line-height: 1;
  }
  .stepper button:hover { background: #edebe2; color: var(--text); }
  .stepper .count { min-width: 34px; text-align: center; font-size: 13px; font-variant-numeric: tabular-nums; }
  .spacer { flex: 1; }
  #go {
    all: unset; cursor: pointer;
    background: var(--accent); color: #fff;
    font: 500 14px var(--sans);
    padding: 9px 20px; border-radius: 11px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background .15s, transform .05s;
  }
  #go:hover { background: var(--accent-hover); }
  #go:active { transform: scale(.98); }
  #go kbd {
    font: 11px var(--sans); background: rgba(255,255,255,.22);
    border-radius: 5px; padding: 1px 6px;
  }

  /* ---------- gallery ---------- */
  #galleryBar { display: none; justify-content: flex-end; margin-top: 20px; }
  #galleryBar.has { display: flex; }
  #deleteAll {
    all: unset; cursor: pointer;
    font-size: 12.5px; color: var(--text-3);
    padding: 4px 10px; border-radius: 8px;
  }
  #deleteAll:hover { color: var(--danger); background: #faf1ee; }
  #gallery {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: cardIn .3s ease both;
    display: flex; flex-direction: column;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(8px) scale(.98); } }
  .card .frame {
    position: relative; aspect-ratio: 1 / 1;
    background: var(--surface-2);
    overflow: hidden;
  }
  .card img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; cursor: zoom-in;
    opacity: 0; transition: opacity .5s ease;
  }
  .card img.ready { opacity: 1; }

  /* generating state */
  .card.generating .frame::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(110deg, var(--surface-2) 30%, #efece1 45%, #f9f2ec 52%, #efece1 59%, var(--surface-2) 72%);
    background-size: 220% 100%;
    animation: shimmer 1.8s linear infinite;
  }
  @keyframes shimmer { to { background-position: -120% 0; } }
  .gen-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    color: var(--text-2);
  }
  .ring {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2.5px solid #e6dcd2; border-top-color: var(--accent);
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .elapsed { font-size: 12.5px; font-variant-numeric: tabular-nums; color: var(--text-3); }

  /* error state */
  .card.error .frame { background: #faf1ee; }
  .err-center {
    position: absolute; inset: 0; padding: 18px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    text-align: center;
  }
  .err-center .msg { font-size: 12.5px; color: var(--danger); max-height: 96px; overflow: hidden; }
  .err-center button {
    all: unset; cursor: pointer; font: 500 12.5px var(--sans);
    color: var(--accent-hover); background: var(--accent-soft);
    border: 1px solid #ecd6cb; padding: 5px 14px; border-radius: 999px;
  }

  .card .meta { padding: 10px 12px 11px; display: flex; flex-direction: column; gap: 6px; }
  .card .prompt-line {
    font-size: 12.5px; color: var(--text-2);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    min-height: 18px; cursor: default;
  }
  .card .sub { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-3); }
  .card .sub .model { color: var(--accent-hover); background: var(--accent-soft); padding: 1px 7px; border-radius: 999px; }
  .card .actions { margin-left: auto; display: inline-flex; gap: 2px; opacity: 0; transition: opacity .15s; }
  .card:hover .actions { opacity: 1; }
  .iconbtn {
    all: unset; cursor: pointer; padding: 3px 6px; border-radius: 7px;
    color: var(--text-2); font-size: 13px; line-height: 1;
  }
  .iconbtn:hover { background: var(--surface-2); color: var(--text); }
  .iconbtn.del:hover { color: var(--danger); }

  /* ---------- empty state ---------- */
  #empty {
    grid-column: 1 / -1; text-align: center; padding: 90px 20px;
    color: var(--text-3);
  }
  #empty .big { font: 400 22px var(--serif); color: var(--text-2); margin-bottom: 8px; }

  /* ---------- lightbox ---------- */
  #lightbox {
    position: fixed; inset: 0; z-index: 100; display: none;
    background: rgba(31, 30, 29, .55); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 32px;
  }
  #lightbox.open { display: flex; animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; } }
  .lb-panel {
    background: var(--surface); border-radius: 18px; box-shadow: var(--shadow-lg);
    max-width: min(1020px, 94vw); max-height: 92vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .lb-panel img { max-width: 100%; max-height: calc(92vh - 96px); object-fit: contain; background: var(--surface-2); }
  .lb-bar { padding: 12px 18px; display: flex; align-items: center; gap: 14px; border-top: 1px solid var(--border); }
  .lb-bar .lb-prompt { font-size: 13px; color: var(--text-2); flex: 1; max-height: 42px; overflow: auto; }
  .lb-bar a, .lb-bar button {
    all: unset; cursor: pointer; font: 500 13px var(--sans); color: var(--accent-hover);
    padding: 6px 12px; border-radius: 9px; background: var(--accent-soft); white-space: nowrap;
  }
  .lb-bar a:hover, .lb-bar button:hover { background: #f2e0d7; }
  .lb-nav {
    all: unset; cursor: pointer;
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255, 255, 255, .92); color: var(--text);
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; line-height: 1; user-select: none;
    transition: background .15s, opacity .15s;
  }
  .lb-nav:hover { background: #fff; }
  .lb-nav:active { transform: translateY(-50%) scale(.94); }
  .lb-nav.hidden { opacity: 0; pointer-events: none; }
  #lbPrev { left: 22px; }
  #lbNext { right: 22px; }
  .lb-count {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    font-size: 12.5px; color: rgba(255, 255, 255, .85);
    background: rgba(31, 30, 29, .5); padding: 3px 12px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- toast ---------- */
  #toasts { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 120; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--text); color: var(--bg); font-size: 13px;
    padding: 9px 16px; border-radius: 11px; box-shadow: var(--shadow-lg);
    animation: cardIn .25s ease;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="spark">✳</span> Image Gen</h1>
    <div class="head-meta">
      <span id="apiName">…</span>
      <span class="dot">·</span>
      <span id="outDir" title="Click to copy the output folder">…</span>
    </div>
    <span id="activeBadge"><span class="pip"></span><span id="activeText"></span></span>
  </header>

  <div class="composer">
    <div id="attachRow"></div>
    <textarea id="prompt" rows="1" placeholder="Describe an image… (Enter to generate · paste or drop images to use as reference)" autofocus></textarea>
    <div class="composer-row">
      <div class="ctl">
        <button id="attachBtn" title="Add reference images — or paste / drag &amp; drop anywhere">＋ img</button>
        <input id="fileInput" type="file" accept="image/*" multiple hidden>
      </div>
      <div class="ctl">
        <select id="model" title="Model"></select>
        <input id="modelCustom" placeholder="model id…" spellcheck="false">
      </div>
      <div class="ctl">
        <select id="size" title="Size">
          <option value="auto">Auto size</option>
          <option value="1024x1024">Square · 1024</option>
          <option value="1536x1024">Landscape · 1536×1024</option>
          <option value="1024x1536">Portrait · 1024×1536</option>
          <option value="1792x1024">Wide · 1792×1024</option>
          <option value="1024x1792">Tall · 1024×1792</option>
        </select>
      </div>
      <div class="ctl">
        <select id="quality" title="Quality">
          <option value="auto">Auto quality</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="ctl">
        <label for="countUp">batch</label>
        <span class="stepper">
          <button id="countDown" title="Fewer">−</button>
          <span class="count" id="countVal">1</span>
          <button id="countUp" title="More">+</button>
        </span>
      </div>
      <div class="spacer"></div>
      <button id="go">Generate <kbd>⏎</kbd></button>
    </div>
    <div id="ctxBar">
      <span class="ctx-label">context</span>
      <div id="ctxRow"></div>
    </div>
  </div>

  <div id="galleryBar">
    <button id="deleteAll" title="Delete every generated image in the gallery">Delete all</button>
  </div>

  <div id="gallery">
    <div id="empty">
      <div class="big">Nothing here yet</div>
      <div>Type a prompt above and press Enter — run as many at once as you like.</div>
    </div>
  </div>
</div>

<div id="lightbox">
  <button id="lbPrev" class="lb-nav" title="Previous image (←)">‹</button>
  <button id="lbNext" class="lb-nav" title="Next image (→)">›</button>
  <span class="lb-count" id="lbCount"></span>
  <div class="lb-panel">
    <img id="lbImg" alt="">
    <div class="lb-bar">
      <div class="lb-prompt" id="lbPrompt"></div>
      <button id="lbReuse">Reuse prompt</button>
      <a id="lbDownload" download>Download</a>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const gallery = $('gallery'), empty = $('empty'), promptEl = $('prompt');
  const modelSel = $('model'), modelCustom = $('modelCustom');
  const sizeSel = $('size'), qualitySel = $('quality');
  const countVal = $('countVal');
  const badge = $('activeBadge'), activeText = $('activeText');

  let count = 1, active = 0;

  // ---- boot ----
  const state = await fetch('/api/state').then((r) => r.json());
  $('apiName').textContent = state.api.name || state.api.id;
  $('outDir').textContent = state.outDir;
  document.title = 'bro · image gen · ' + (state.api.name || state.api.id);

  for (const m of state.models) {
    const o = document.createElement('option');
    o.value = m.id;
    o.textContent = m.name || m.id;
    modelSel.appendChild(o);
  }
  const custom = document.createElement('option');
  custom.value = '__custom__';
  custom.textContent = 'Custom model…';
  modelSel.appendChild(custom);

  // restore last choices
  const saved = JSON.parse(localStorage.getItem('bro-imagegen-' + state.api.id) || '{}');
  if (saved.model && [...modelSel.options].some((o) => o.value === saved.model)) modelSel.value = saved.model;
  else if (saved.model) { modelSel.value = '__custom__'; modelCustom.style.display = 'inline-block'; modelCustom.value = saved.model; }
  if (saved.size) sizeSel.value = saved.size;
  if (saved.quality) qualitySel.value = saved.quality;
  if (saved.count) { count = saved.count; countVal.textContent = count; }

  const currentModel = () => (modelSel.value === '__custom__' ? modelCustom.value.trim() : modelSel.value);

  // Chat-routed models (e.g. Gemini) take no size/quality params — steer via the prompt.
  const isChatModel = (id) => {
    const known = state.models.find((m) => m.id === id);
    return known ? known.via === 'chat' : /gemini|flash-image|banana/i.test(id);
  };
  function syncKnobs() {
    const chat = isChatModel(currentModel());
    sizeSel.disabled = chat;
    qualitySel.disabled = chat;
    const tip = chat ? 'Not used by this model — describe size/quality in the prompt' : '';
    sizeSel.title = tip || 'Size';
    qualitySel.title = tip || 'Quality';
  }
  const persist = () =>
    localStorage.setItem('bro-imagegen-' + state.api.id, JSON.stringify({ model: currentModel(), size: sizeSel.value, quality: qualitySel.value, count }));

  modelSel.addEventListener('change', () => {
    modelCustom.style.display = modelSel.value === '__custom__' ? 'inline-block' : 'none';
    if (modelSel.value === '__custom__') modelCustom.focus();
    persist();
    syncKnobs();
  });
  modelCustom.addEventListener('input', () => { persist(); syncKnobs(); });
  syncKnobs();
  sizeSel.addEventListener('change', persist);
  qualitySel.addEventListener('change', persist);

  $('countDown').onclick = () => { count = Math.max(1, count - 1); countVal.textContent = count; persist(); };
  $('countUp').onclick = () => { count = Math.min(12, count + 1); countVal.textContent = count; persist(); };

  $('outDir').onclick = async () => {
    try { await navigator.clipboard.writeText(state.outDir); toast('Output folder copied'); } catch {}
  };

  // ---- reference images ----
  // Uploads land in .bro/context named by content hash (server dedupes), and the
  // library strip lets you re-attach any of them with a click.
  let ctxItems = state.context || []; // [{ file, ts }]
  const attachments = []; // context file names attached to the next generation
  const attachRow = $('attachRow'), ctxBar = $('ctxBar'), ctxRow = $('ctxRow'), fileInput = $('fileInput');
  const MAX_ATTACH = 8, MAX_DIM = 2048;
  const ctxUrl = (f) => '/context/' + encodeURIComponent(f);

  // ---- viewport-based image loading ----
  // Decoded bitmap memory (not DOM node count) is what actually blows up a long
  // session's memory — so images load their src on approach and drop it again once
  // scrolled well out of view, instead of every <img> ever created holding a decode.
  const lazyObserver = new IntersectionObserver((entries) => {
    for (const e of entries) {
      const img = e.target;
      if (e.isIntersecting) {
        if (img.dataset.src && img.src !== img.dataset.src) img.src = img.dataset.src;
      } else if (img.dataset.src) {
        img.removeAttribute('src');
        img.classList.remove('ready');
      }
    }
  }, { rootMargin: '800px 0px' });
  function lazyImg(img, src) {
    img.dataset.src = src;
    lazyObserver.observe(img);
  }

  function renderRefs() {
    attachRow.innerHTML = '';
    attachRow.classList.toggle('has', attachments.length > 0);
    for (const f of attachments) {
      const chip = document.createElement('div');
      chip.className = 'chip';
      const img = document.createElement('img');
      img.src = ctxUrl(f);
      img.alt = f;
      const rm = document.createElement('button');
      rm.className = 'rm';
      rm.textContent = '✕';
      rm.title = 'Detach';
      rm.onclick = () => detach(f);
      chip.append(img, rm);
      attachRow.appendChild(chip);
    }

    ctxRow.querySelectorAll('img').forEach((img) => lazyObserver.unobserve(img));
    ctxRow.innerHTML = '';
    ctxBar.classList.toggle('has', ctxItems.length > 0);
    for (const it of ctxItems) {
      const sel = attachments.includes(it.file);
      const d = document.createElement('div');
      d.className = 'ctx-item' + (sel ? ' sel' : '');
      d.title = sel ? 'Click to detach' : 'Click to attach';
      const img = document.createElement('img');
      lazyImg(img, ctxUrl(it.file));
      img.alt = it.file;
      const rm = document.createElement('button');
      rm.className = 'rm';
      rm.textContent = '✕';
      rm.title = 'Delete from library';
      rm.onclick = async (e) => {
        e.stopPropagation();
        await fetch('/api/context/delete', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ file: it.file }) });
        ctxItems = ctxItems.filter((c) => c.file !== it.file);
        const i = attachments.indexOf(it.file);
        if (i >= 0) attachments.splice(i, 1);
        renderRefs();
      };
      d.onclick = () => (attachments.includes(it.file) ? detach(it.file) : attach(it.file));
      d.append(img, rm);
      ctxRow.appendChild(d);
    }
  }

  function attach(f) {
    if (attachments.includes(f)) return;
    if (attachments.length >= MAX_ATTACH) { toast('Max ' + MAX_ATTACH + ' reference images'); return; }
    attachments.push(f);
    renderRefs();
  }
  function detach(f) {
    const i = attachments.indexOf(f);
    if (i >= 0) attachments.splice(i, 1);
    renderRefs();
  }

  // Read a file as a data URL, downscaling anything over MAX_DIM so the
  // request body (and the upstream API) doesn't choke on 40MP screenshots.
  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onerror = reject;
      fr.onload = () => {
        const img = new Image();
        img.onerror = () => resolve(fr.result); // undecodable here — send as-is
        img.onload = () => {
          if (img.width <= MAX_DIM && img.height <= MAX_DIM) return resolve(fr.result);
          const s = MAX_DIM / Math.max(img.width, img.height);
          const c = document.createElement('canvas');
          c.width = Math.round(img.width * s);
          c.height = Math.round(img.height * s);
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          resolve(c.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.92));
        };
        img.src = fr.result;
      };
      fr.readAsDataURL(file);
    });
  }

  async function addImageFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    try {
      const dataUrl = await fileToDataUrl(file);
      const r = await fetch('/api/context', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ dataUrl }) });
      const body = await r.json();
      if (!r.ok) throw new Error(body.error || 'HTTP ' + r.status);
      if (!ctxItems.some((c) => c.file === body.file)) ctxItems.unshift({ file: body.file, ts: Date.now() });
      else if (body.existed && attachments.includes(body.file)) toast('Already attached');
      attach(body.file);
    } catch (e) { toast('Upload failed: ' + (e.message || e)); }
  }

  $('attachBtn').onclick = () => fileInput.click();
  fileInput.onchange = () => { [...fileInput.files].forEach(addImageFile); fileInput.value = ''; };

  document.addEventListener('paste', (e) => {
    const files = [...(e.clipboardData?.items || [])]
      .filter((i) => i.kind === 'file' && i.type.startsWith('image/'))
      .map((i) => i.getAsFile());
    if (!files.length) return;
    e.preventDefault();
    files.forEach(addImageFile);
    promptEl.focus();
  });

  const composerEl = document.querySelector('.composer');
  document.addEventListener('dragover', (e) => {
    if ([...(e.dataTransfer?.types || [])].includes('Files')) {
      e.preventDefault();
      composerEl.classList.add('dragover');
    }
  });
  document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) composerEl.classList.remove('dragover'); });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    composerEl.classList.remove('dragover');
    [...(e.dataTransfer?.files || [])].forEach(addImageFile);
  });

  // ---- toasts ----
  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    $('toasts').appendChild(t);
    setTimeout(() => t.remove(), 2600);
  }

  // ---- badge ----
  function setActive(d) {
    active += d;
    badge.classList.toggle('on', active > 0);
    activeText.textContent = active === 1 ? '1 generating' : active + ' generating';
  }

  // ---- cards ----
  const fmtSec = (ms) => (ms / 1000).toFixed(1) + 's';

  const galleryBar = $('galleryBar');
  const syncGalleryBar = () => galleryBar.classList.toggle('has', !!gallery.querySelector('.card'));

  // Always route card removal through here so the lazy-loading observer never
  // keeps a reference to a detached <img> (that would itself leak memory).
  function removeCard(card) {
    card.querySelectorAll('img').forEach((img) => lazyObserver.unobserve(img));
    card.remove();
  }

  $('deleteAll').onclick = async () => {
    const cards = [...gallery.querySelectorAll('.card')].filter((c) => !c.classList.contains('generating'));
    if (!cards.length) return;
    const n = cards.length;
    if (!confirm('Delete all ' + n + ' generated image' + (n === 1 ? '' : 's') + '? This can’t be undone. (Context images are kept.)')) return;
    const r = await fetch('/api/delete-all', { method: 'POST' });
    if (!r.ok) { toast('Delete failed'); return; }
    cards.forEach(removeCard);
    if (!gallery.querySelector('.card')) empty.style.display = '';
    syncGalleryBar();
    toast('Deleted ' + (await r.json()).deleted + ' images');
  };

  // Cards accumulate over a session (each generation prepends one) — cap how many
  // stay in the DOM so memory doesn't grow without bound in long-running sessions.
  const MAX_CARDS = 400;
  function trimGallery() {
    const cards = [...gallery.querySelectorAll('.card')];
    for (const c of cards.slice(MAX_CARDS).reverse()) {
      if (c.classList.contains('generating')) continue;
      removeCard(c);
    }
  }

  function baseCard() {
    empty.style.display = 'none';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="frame"></div>' +
      '<div class="meta"><div class="prompt-line"></div>' +
      '<div class="sub"><span class="model"></span><span class="time"></span>' +
      '<span class="refs" title="Reference images"></span>' +
      '<span class="actions"></span></div></div>';
    gallery.prepend(card);
    syncGalleryBar();
    trimGallery();
    return card;
  }

  function fillDone(card, item) {
    card.classList.remove('generating', 'error');
    card._item = item; // marks the card as done + navigable from the lightbox
    const frame = card.querySelector('.frame');
    frame.innerHTML = '';
    const img = document.createElement('img');
    lazyImg(img, '/images/' + encodeURIComponent(item.file));
    img.alt = item.prompt;
    img.onload = () => img.classList.add('ready');
    img.onclick = () => openLightbox(item);
    frame.appendChild(img);

    card.querySelector('.prompt-line').textContent = item.prompt;
    card.querySelector('.prompt-line').title = item.prompt;
    card.querySelector('.model').textContent = item.model;
    card.querySelector('.time').textContent = item.ms ? fmtSec(item.ms) : '';
    card.querySelector('.refs').textContent = item.refs ? '⧉ ' + item.refs : '';

    const actions = card.querySelector('.actions');
    actions.innerHTML = '';
    const mk = (label, title, fn, cls) => {
      const b = document.createElement('button');
      b.className = 'iconbtn' + (cls ? ' ' + cls : '');
      b.textContent = label;
      b.title = title;
      b.onclick = fn;
      actions.appendChild(b);
    };
    mk('↻', 'Reuse prompt', () => { promptEl.value = item.prompt; promptEl.focus(); autosize(); });
    mk('⤓', 'Download', () => { const a = document.createElement('a'); a.href = '/images/' + encodeURIComponent(item.file); a.download = item.file; a.click(); });
    mk('✕', 'Delete', async () => {
      await fetch('/api/delete', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ file: item.file }) });
      removeCard(card);
      if (!gallery.querySelector('.card')) empty.style.display = '';
      syncGalleryBar();
    }, 'del');
  }

  function fireGeneration(prompt, model, size, quality, images) {
    const card = baseCard();
    card.classList.add('generating');
    const frame = card.querySelector('.frame');
    frame.innerHTML = '<div class="gen-center"><div class="ring"></div><div class="elapsed">0.0s</div></div>';
    card.querySelector('.prompt-line').textContent = prompt;
    card.querySelector('.model').textContent = model;
    card.querySelector('.refs').textContent = images.length ? '⧉ ' + images.length : '';

    const started = Date.now();
    const elapsedEl = frame.querySelector('.elapsed');
    const timer = setInterval(() => { elapsedEl.textContent = fmtSec(Date.now() - started); }, 100);

    setActive(1);
    fetch('/api/generate', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ prompt, model, size, quality, images })
    })
      .then(async (r) => {
        const body = await r.json();
        if (!r.ok) throw new Error(body.error || 'HTTP ' + r.status);
        fillDone(card, body);
        if (lightbox.classList.contains('open')) syncLbNav();
      })
      .catch((e) => {
        card.classList.remove('generating');
        card.classList.add('error');
        frame.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'err-center';
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.textContent = e.message || 'Generation failed';
        const retry = document.createElement('button');
        retry.textContent = 'Retry';
        retry.onclick = () => { removeCard(card); fireGeneration(prompt, model, size, quality, images); if (!gallery.querySelector('.card')) empty.style.display = ''; };
        div.append(msg, retry);
        frame.appendChild(div);
        card.querySelector('.time').textContent = fmtSec(Date.now() - started);
      })
      .finally(() => { clearInterval(timer); setActive(-1); });
  }

  function generate() {
    const prompt = promptEl.value.trim();
    if (!prompt) { promptEl.focus(); return; }
    const model = currentModel();
    if (!model) { toast('Pick or type a model first'); modelCustom.focus(); return; }
    persist();
    const images = [...attachments]; // snapshot — detaching later must not affect in-flight retries
    for (let i = 0; i < count; i++) fireGeneration(prompt, model, sizeSel.value, qualitySel.value, images);
  }

  $('go').onclick = generate;
  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); generate(); }
  });

  // autosize the prompt box
  function autosize() {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  }
  promptEl.addEventListener('input', autosize);

  // ---- lightbox ----
  const lightbox = $('lightbox'), lbImg = $('lbImg');
  const lbPrev = $('lbPrev'), lbNext = $('lbNext'), lbCount = $('lbCount');
  let lbFile = null;

  // Finished images in gallery order (newest first) — recomputed each time so
  // generations that complete while the lightbox is open become navigable.
  const doneItems = () => [...gallery.querySelectorAll('.card')].map((c) => c._item).filter(Boolean);

  function syncLbNav() {
    const items = doneItems();
    const i = items.findIndex((it) => it.file === lbFile);
    lbPrev.classList.toggle('hidden', i <= 0);
    lbNext.classList.toggle('hidden', i < 0 || i >= items.length - 1);
    lbCount.textContent = i >= 0 ? (i + 1) + ' / ' + items.length : '';
  }

  function lbStep(d) {
    const items = doneItems();
    const i = items.findIndex((it) => it.file === lbFile);
    const next = items[i + d];
    if (next) openLightbox(next);
  }
  lbPrev.onclick = () => lbStep(-1);
  lbNext.onclick = () => lbStep(1);

  function openLightbox(item) {
    lbFile = item.file;
    lbImg.src = '/images/' + encodeURIComponent(item.file);
    $('lbPrompt').textContent = item.revisedPrompt || item.prompt;
    $('lbDownload').href = '/images/' + encodeURIComponent(item.file);
    $('lbDownload').download = item.file;
    $('lbReuse').onclick = () => { promptEl.value = item.prompt; lightbox.classList.remove('open'); promptEl.focus(); autosize(); };
    lightbox.classList.add('open');
    syncLbNav();
  }
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { lightbox.classList.remove('open'); return; }
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); lbStep(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); lbStep(1); }
  });

  // ---- history ----
  for (const item of state.history || []) fillDone(baseCard(), item);
  renderRefs();
})();
</script>
</body>
</html>
