<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bro · image gen</title>
<style>
  /* claude.ai-inspired palette: warm ivory surfaces, serif display, terracotta accent */
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --surface-2: #f5f4ee;
    --border: #e8e6dc;
    --border-strong: #d9d6c8;
    --text: #1f1e1d;
    --text-2: #6e6b60;
    --text-3: #a6a294;
    --accent: #d97757;
    --accent-hover: #c96442;
    --accent-soft: #f7ede8;
    --danger: #b4442c;
    --shadow: 0 1px 2px rgba(31, 30, 29, .04), 0 4px 16px rgba(31, 30, 29, .06);
    --shadow-lg: 0 4px 12px rgba(31, 30, 29, .08), 0 16px 48px rgba(31, 30, 29, .14);
    --radius: 14px;
    --serif: ui-serif, Georgia, 'Times New Roman', serif;
    --sans: ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 var(--sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 24px 96px; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: baseline; gap: 14px;
    padding: 30px 2px 6px;
  }
  header h1 {
    font: 400 26px/1.2 var(--serif);
    letter-spacing: -.01em;
    margin: 0;
  }
  header h1 .spark { color: var(--accent); }
  .head-meta { color: var(--text-2); font-size: 13px; display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .head-meta .dot { color: var(--border-strong); }
  #outDir { cursor: pointer; border-bottom: 1px dotted var(--border-strong); }
  #outDir:hover { color: var(--text); }
  #activeBadge {
    display: none; margin-left: auto; align-self: center;
    font-size: 12.5px; color: var(--accent-hover);
    background: var(--accent-soft); border: 1px solid #ecd6cb;
    padding: 3px 10px; border-radius: 999px;
  }
  #activeBadge.on { display: inline-flex; align-items: center; gap: 7px; }
  #activeBadge .pip {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; transform: scale(.8); } }

  /* ---------- composer ---------- */
  .composer {
    position: sticky; top: 14px; z-index: 40;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 14px 14px 10px;
    margin-top: 14px;
    transition: box-shadow .2s, border-color .2s;
  }
  .composer:focus-within { border-color: var(--border-strong); box-shadow: var(--shadow-lg); }
  #prompt {
    width: 100%; border: 0; outline: 0; resize: none;
    background: transparent; color: var(--text);
    font: 16px/1.5 var(--sans);
    min-height: 27px; max-height: 160px;
    padding: 2px 4px;
  }
  #prompt::placeholder { color: var(--text-3); }
  .composer-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--surface-2);
  }
  .ctl { display: inline-flex; align-items: center; gap: 6px; }
  .ctl label { font-size: 12px; color: var(--text-3); }
  select, .stepper {
    appearance: none; -webkit-appearance: none;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 9px;
    font: 13px var(--sans); padding: 6px 10px;
    cursor: pointer; outline: none;
  }
  select:hover { border-color: var(--border-strong); }
  select:focus { border-color: var(--accent); }
  select:disabled { opacity: .45; cursor: not-allowed; }
  #modelCustom {
    display: none; width: 170px;
    background: var(--surface-2); border: 1px solid var(--accent);
    border-radius: 9px; padding: 6px 10px; font: 13px var(--sans);
    color: var(--text); outline: none;
  }
  .stepper { display: inline-flex; align-items: center; padding: 0; overflow: hidden; user-select: none; }
  .stepper button {
    all: unset; cursor: pointer; padding: 6px 11px; color: var(--text-2);
    font-size: 14px; line-height: 1;
  }
  .stepper button:hover { background: #edebe2; color: var(--text); }
  .stepper .count { min-width: 34px; text-align: center; font-size: 13px; font-variant-numeric: tabular-nums; }
  .spacer { flex: 1; }
  #go {
    all: unset; cursor: pointer;
    background: var(--accent); color: #fff;
    font: 500 14px var(--sans);
    padding: 9px 20px; border-radius: 11px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background .15s, transform .05s;
  }
  #go:hover { background: var(--accent-hover); }
  #go:active { transform: scale(.98); }
  #go kbd {
    font: 11px var(--sans); background: rgba(255,255,255,.22);
    border-radius: 5px; padding: 1px 6px;
  }

  /* ---------- gallery ---------- */
  #gallery {
    margin-top: 26px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: cardIn .3s ease both;
    display: flex; flex-direction: column;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(8px) scale(.98); } }
  .card .frame {
    position: relative; aspect-ratio: 1 / 1;
    background: var(--surface-2);
    overflow: hidden;
  }
  .card img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; cursor: zoom-in;
    opacity: 0; transition: opacity .5s ease;
  }
  .card img.ready { opacity: 1; }

  /* generating state */
  .card.generating .frame::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(110deg, var(--surface-2) 30%, #efece1 45%, #f9f2ec 52%, #efece1 59%, var(--surface-2) 72%);
    background-size: 220% 100%;
    animation: shimmer 1.8s linear infinite;
  }
  @keyframes shimmer { to { background-position: -120% 0; } }
  .gen-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    color: var(--text-2);
  }
  .ring {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2.5px solid #e6dcd2; border-top-color: var(--accent);
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .elapsed { font-size: 12.5px; font-variant-numeric: tabular-nums; color: var(--text-3); }

  /* error state */
  .card.error .frame { background: #faf1ee; }
  .err-center {
    position: absolute; inset: 0; padding: 18px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    text-align: center;
  }
  .err-center .msg { font-size: 12.5px; color: var(--danger); max-height: 96px; overflow: hidden; }
  .err-center button {
    all: unset; cursor: pointer; font: 500 12.5px var(--sans);
    color: var(--accent-hover); background: var(--accent-soft);
    border: 1px solid #ecd6cb; padding: 5px 14px; border-radius: 999px;
  }

  .card .meta { padding: 10px 12px 11px; display: flex; flex-direction: column; gap: 6px; }
  .card .prompt-line {
    font-size: 12.5px; color: var(--text-2);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    min-height: 18px; cursor: default;
  }
  .card .sub { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-3); }
  .card .sub .model { color: var(--accent-hover); background: var(--accent-soft); padding: 1px 7px; border-radius: 999px; }
  .card .actions { margin-left: auto; display: inline-flex; gap: 2px; opacity: 0; transition: opacity .15s; }
  .card:hover .actions { opacity: 1; }
  .iconbtn {
    all: unset; cursor: pointer; padding: 3px 6px; border-radius: 7px;
    color: var(--text-2); font-size: 13px; line-height: 1;
  }
  .iconbtn:hover { background: var(--surface-2); color: var(--text); }
  .iconbtn.del:hover { color: var(--danger); }

  /* ---------- empty state ---------- */
  #empty {
    grid-column: 1 / -1; text-align: center; padding: 90px 20px;
    color: var(--text-3);
  }
  #empty .big { font: 400 22px var(--serif); color: var(--text-2); margin-bottom: 8px; }

  /* ---------- lightbox ---------- */
  #lightbox {
    position: fixed; inset: 0; z-index: 100; display: none;
    background: rgba(31, 30, 29, .55); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 32px;
  }
  #lightbox.open { display: flex; animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; } }
  .lb-panel {
    background: var(--surface); border-radius: 18px; box-shadow: var(--shadow-lg);
    max-width: min(1020px, 94vw); max-height: 92vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .lb-panel img { max-width: 100%; max-height: calc(92vh - 96px); object-fit: contain; background: var(--surface-2); }
  .lb-bar { padding: 12px 18px; display: flex; align-items: center; gap: 14px; border-top: 1px solid var(--border); }
  .lb-bar .lb-prompt { font-size: 13px; color: var(--text-2); flex: 1; max-height: 42px; overflow: auto; }
  .lb-bar a, .lb-bar button {
    all: unset; cursor: pointer; font: 500 13px var(--sans); color: var(--accent-hover);
    padding: 6px 12px; border-radius: 9px; background: var(--accent-soft); white-space: nowrap;
  }
  .lb-bar a:hover, .lb-bar button:hover { background: #f2e0d7; }
  .lb-nav {
    all: unset; cursor: pointer;
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255, 255, 255, .92); color: var(--text);
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; line-height: 1; user-select: none;
    transition: background .15s, opacity .15s;
  }
  .lb-nav:hover { background: #fff; }
  .lb-nav:active { transform: translateY(-50%) scale(.94); }
  .lb-nav.hidden { opacity: 0; pointer-events: none; }
  #lbPrev { left: 22px; }
  #lbNext { right: 22px; }
  .lb-count {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    font-size: 12.5px; color: rgba(255, 255, 255, .85);
    background: rgba(31, 30, 29, .5); padding: 3px 12px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- toast ---------- */
  #toasts { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 120; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--text); color: var(--bg); font-size: 13px;
    padding: 9px 16px; border-radius: 11px; box-shadow: var(--shadow-lg);
    animation: cardIn .25s ease;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="spark">✳</span> Image Gen</h1>
    <div class="head-meta">
      <span id="apiName">…</span>
      <span class="dot">·</span>
      <span id="outDir" title="Click to copy the output folder">…</span>
    </div>
    <span id="activeBadge"><span class="pip"></span><span id="activeText"></span></span>
  </header>

  <div class="composer">
    <textarea id="prompt" rows="1" placeholder="Describe an image… (Enter to generate, Shift+Enter for a new line)" autofocus></textarea>
    <div class="composer-row">
      <div class="ctl">
        <select id="model" title="Model"></select>
        <input id="modelCustom" placeholder="model id…" spellcheck="false">
      </div>
      <div class="ctl">
        <select id="size" title="Size">
          <option value="auto">Auto size</option>
          <option value="1024x1024">Square · 1024</option>
          <option value="1536x1024">Landscape · 1536×1024</option>
          <option value="1024x1536">Portrait · 1024×1536</option>
          <option value="1792x1024">Wide · 1792×1024</option>
          <option value="1024x1792">Tall · 1024×1792</option>
        </select>
      </div>
      <div class="ctl">
        <select id="quality" title="Quality">
          <option value="auto">Auto quality</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="ctl">
        <label for="countUp">batch</label>
        <span class="stepper">
          <button id="countDown" title="Fewer">−</button>
          <span class="count" id="countVal">1</span>
          <button id="countUp" title="More">+</button>
        </span>
      </div>
      <div class="spacer"></div>
      <button id="go">Generate <kbd>⏎</kbd></button>
    </div>
  </div>

  <div id="gallery">
    <div id="empty">
      <div class="big">Nothing here yet</div>
      <div>Type a prompt above and press Enter — run as many at once as you like.</div>
    </div>
  </div>
</div>

<div id="lightbox">
  <button id="lbPrev" class="lb-nav" title="Previous image (←)">‹</button>
  <button id="lbNext" class="lb-nav" title="Next image (→)">›</button>
  <span class="lb-count" id="lbCount"></span>
  <div class="lb-panel">
    <img id="lbImg" alt="">
    <div class="lb-bar">
      <div class="lb-prompt" id="lbPrompt"></div>
      <button id="lbReuse">Reuse prompt</button>
      <a id="lbDownload" download>Download</a>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const gallery = $('gallery'), empty = $('empty'), promptEl = $('prompt');
  const modelSel = $('model'), modelCustom = $('modelCustom');
  const sizeSel = $('size'), qualitySel = $('quality');
  const countVal = $('countVal');
  const badge = $('activeBadge'), activeText = $('activeText');

  let count = 1, active = 0;

  // ---- boot ----
  const state = await fetch('/api/state').then((r) => r.json());
  $('apiName').textContent = state.api.name || state.api.id;
  $('outDir').textContent = state.outDir;
  document.title = 'bro · image gen · ' + (state.api.name || state.api.id);

  for (const m of state.models) {
    const o = document.createElement('option');
    o.value = m.id;
    o.textContent = m.name || m.id;
    modelSel.appendChild(o);
  }
  const custom = document.createElement('option');
  custom.value = '__custom__';
  custom.textContent = 'Custom model…';
  modelSel.appendChild(custom);

  // restore last choices
  const saved = JSON.parse(localStorage.getItem('bro-imagegen-' + state.api.id) || '{}');
  if (saved.model && [...modelSel.options].some((o) => o.value === saved.model)) modelSel.value = saved.model;
  else if (saved.model) { modelSel.value = '__custom__'; modelCustom.style.display = 'inline-block'; modelCustom.value = saved.model; }
  if (saved.size) sizeSel.value = saved.size;
  if (saved.quality) qualitySel.value = saved.quality;
  if (saved.count) { count = saved.count; countVal.textContent = count; }

  const currentModel = () => (modelSel.value === '__custom__' ? modelCustom.value.trim() : modelSel.value);

  // Chat-routed models (e.g. Gemini) take no size/quality params — steer via the prompt.
  const isChatModel = (id) => {
    const known = state.models.find((m) => m.id === id);
    return known ? known.via === 'chat' : /gemini|flash-image|banana/i.test(id);
  };
  function syncKnobs() {
    const chat = isChatModel(currentModel());
    sizeSel.disabled = chat;
    qualitySel.disabled = chat;
    const tip = chat ? 'Not used by this model — describe size/quality in the prompt' : '';
    sizeSel.title = tip || 'Size';
    qualitySel.title = tip || 'Quality';
  }
  const persist = () =>
    localStorage.setItem('bro-imagegen-' + state.api.id, JSON.stringify({ model: currentModel(), size: sizeSel.value, quality: qualitySel.value, count }));

  modelSel.addEventListener('change', () => {
    modelCustom.style.display = modelSel.value === '__custom__' ? 'inline-block' : 'none';
    if (modelSel.value === '__custom__') modelCustom.focus();
    persist();
    syncKnobs();
  });
  modelCustom.addEventListener('input', () => { persist(); syncKnobs(); });
  syncKnobs();
  sizeSel.addEventListener('change', persist);
  qualitySel.addEventListener('change', persist);

  $('countDown').onclick = () => { count = Math.max(1, count - 1); countVal.textContent = count; persist(); };
  $('countUp').onclick = () => { count = Math.min(12, count + 1); countVal.textContent = count; persist(); };

  $('outDir').onclick = async () => {
    try { await navigator.clipboard.writeText(state.outDir); toast('Output folder copied'); } catch {}
  };

  // ---- toasts ----
  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    $('toasts').appendChild(t);
    setTimeout(() => t.remove(), 2600);
  }

  // ---- badge ----
  function setActive(d) {
    active += d;
    badge.classList.toggle('on', active > 0);
    activeText.textContent = active === 1 ? '1 generating' : active + ' generating';
  }

  // ---- cards ----
  const fmtSec = (ms) => (ms / 1000).toFixed(1) + 's';

  function baseCard() {
    empty.style.display = 'none';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="frame"></div>' +
      '<div class="meta"><div class="prompt-line"></div>' +
      '<div class="sub"><span class="model"></span><span class="time"></span>' +
      '<span class="actions"></span></div></div>';
    gallery.prepend(card);
    return card;
  }

  function fillDone(card, item) {
    card.classList.remove('generating', 'error');
    card._item = item; // marks the card as done + navigable from the lightbox
    const frame = card.querySelector('.frame');
    frame.innerHTML = '';
    const img = document.createElement('img');
    img.src = '/images/' + encodeURIComponent(item.file);
    img.alt = item.prompt;
    img.onload = () => img.classList.add('ready');
    img.onclick = () => openLightbox(item);
    frame.appendChild(img);

    card.querySelector('.prompt-line').textContent = item.prompt;
    card.querySelector('.prompt-line').title = item.prompt;
    card.querySelector('.model').textContent = item.model;
    card.querySelector('.time').textContent = item.ms ? fmtSec(item.ms) : '';

    const actions = card.querySelector('.actions');
    actions.innerHTML = '';
    const mk = (label, title, fn, cls) => {
      const b = document.createElement('button');
      b.className = 'iconbtn' + (cls ? ' ' + cls : '');
      b.textContent = label;
      b.title = title;
      b.onclick = fn;
      actions.appendChild(b);
    };
    mk('↻', 'Reuse prompt', () => { promptEl.value = item.prompt; promptEl.focus(); autosize(); });
    mk('⤓', 'Download', () => { const a = document.createElement('a'); a.href = '/images/' + encodeURIComponent(item.file); a.download = item.file; a.click(); });
    mk('✕', 'Delete', async () => {
      await fetch('/api/delete', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ file: item.file }) });
      card.remove();
      if (!gallery.querySelector('.card')) empty.style.display = '';
    }, 'del');
  }

  function fireGeneration(prompt, model, size, quality) {
    const card = baseCard();
    card.classList.add('generating');
    const frame = card.querySelector('.frame');
    frame.innerHTML = '<div class="gen-center"><div class="ring"></div><div class="elapsed">0.0s</div></div>';
    card.querySelector('.prompt-line').textContent = prompt;
    card.querySelector('.model').textContent = model;

    const started = Date.now();
    const elapsedEl = frame.querySelector('.elapsed');
    const timer = setInterval(() => { elapsedEl.textContent = fmtSec(Date.now() - started); }, 100);

    setActive(1);
    fetch('/api/generate', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ prompt, model, size, quality })
    })
      .then(async (r) => {
        const body = await r.json();
        if (!r.ok) throw new Error(body.error || 'HTTP ' + r.status);
        fillDone(card, body);
        if (lightbox.classList.contains('open')) syncLbNav();
      })
      .catch((e) => {
        card.classList.remove('generating');
        card.classList.add('error');
        frame.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'err-center';
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.textContent = e.message || 'Generation failed';
        const retry = document.createElement('button');
        retry.textContent = 'Retry';
        retry.onclick = () => { card.remove(); fireGeneration(prompt, model, size, quality); if (!gallery.querySelector('.card')) empty.style.display = ''; };
        div.append(msg, retry);
        frame.appendChild(div);
        card.querySelector('.time').textContent = fmtSec(Date.now() - started);
      })
      .finally(() => { clearInterval(timer); setActive(-1); });
  }

  function generate() {
    const prompt = promptEl.value.trim();
    if (!prompt) { promptEl.focus(); return; }
    const model = currentModel();
    if (!model) { toast('Pick or type a model first'); modelCustom.focus(); return; }
    persist();
    for (let i = 0; i < count; i++) fireGeneration(prompt, model, sizeSel.value, qualitySel.value);
  }

  $('go').onclick = generate;
  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); generate(); }
  });

  // autosize the prompt box
  function autosize() {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  }
  promptEl.addEventListener('input', autosize);

  // ---- lightbox ----
  const lightbox = $('lightbox'), lbImg = $('lbImg');
  const lbPrev = $('lbPrev'), lbNext = $('lbNext'), lbCount = $('lbCount');
  let lbFile = null;

  // Finished images in gallery order (newest first) — recomputed each time so
  // generations that complete while the lightbox is open become navigable.
  const doneItems = () => [...gallery.querySelectorAll('.card')].map((c) => c._item).filter(Boolean);

  function syncLbNav() {
    const items = doneItems();
    const i = items.findIndex((it) => it.file === lbFile);
    lbPrev.classList.toggle('hidden', i <= 0);
    lbNext.classList.toggle('hidden', i < 0 || i >= items.length - 1);
    lbCount.textContent = i >= 0 ? (i + 1) + ' / ' + items.length : '';
  }

  function lbStep(d) {
    const items = doneItems();
    const i = items.findIndex((it) => it.file === lbFile);
    const next = items[i + d];
    if (next) openLightbox(next);
  }
  lbPrev.onclick = () => lbStep(-1);
  lbNext.onclick = () => lbStep(1);

  function openLightbox(item) {
    lbFile = item.file;
    lbImg.src = '/images/' + encodeURIComponent(item.file);
    $('lbPrompt').textContent = item.revisedPrompt || item.prompt;
    $('lbDownload').href = '/images/' + encodeURIComponent(item.file);
    $('lbDownload').download = item.file;
    $('lbReuse').onclick = () => { promptEl.value = item.prompt; lightbox.classList.remove('open'); promptEl.focus(); autosize(); };
    lightbox.classList.add('open');
    syncLbNav();
  }
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { lightbox.classList.remove('open'); return; }
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); lbStep(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); lbStep(1); }
  });

  // ---- history ----
  for (const item of state.history || []) fillDone(baseCard(), item);
})();
</script>
</body>
</html>
